spring:
  application:
    name: simplePetManager
  config:
    import: optional:classpath:config.yaml
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
  servlet:
    encoding:
      charset: utf-8
      force: true
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Render 포트 차단으로 인해 SMTP 설정은 사용하지 않는다.
  # mail:
  #   host: smtp.resend.com
  #   port: 465
  #   username: resend
  #   password: ${RESEND_API_KEY}
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         ssl:
  #           enable: true
  #       debug: false

# [추가] Brevo API 설정 (Port 443 사용으로 차단 우회)
api:
  brevo:
    url: https://api.brevo.com/v3/smtp/email
    key: ${BREVO_API_KEY}

mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

file:
  upload:
    path: ${upload.profile-path}
    board-path: ${upload.board-path}

jwt:
  secret: ${jwt.config.secret}
  access-expiry: 1800000
  refresh-expiry: 1209600000

logging:
  level:
    com.project.simplepetmanager: DEBUG
    org.mybatis: DEBUG
    java.sql: DEBUG
    java.sql.ResultSet: DEBUG